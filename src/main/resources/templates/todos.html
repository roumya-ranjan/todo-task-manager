<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Todo Task Manager</h2>
	<div class="d-flex justify-content-between align-items-center mb-3">

	    <h4>
	        Welcome, <span th:text="${user.name}"></span>
	    </h4>

	</div>

    <a href="/add-todo" class="btn btn-success mb-3">
        Add New Task
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Expected Complete</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

			<tr th:each="todo : ${todos}"
			    th:classappend="${
			        todo.status == 'COMPLETED' ? 'table-success' :
			        (todo.dueDate != null and todo.dueDate.isBefore(T(java.time.LocalDateTime).now())) ? 'table-danger' : ''
			    }">

            <td th:text="${todo.id}"></td>
            <td th:text="${todo.title}"></td>
            <td th:text="${todo.description}"></td>
            <td th:text="${todo.status}"></td>
            <td th:text="${#temporals.format(todo.dueDate, 'dd-MM-yyyy HH:mm')}"></td>

            <td>
                <a th:href="@{'/edit-todo/' + ${todo.id}}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/delete-todo/{id}(id=${todo.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this task?');">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>
<div class="d-flex justify-content-center mt-4">

    <a href="/logout" class="btn btn-danger px-4">
        Logout
    </a>

</div>

</body>
</html>
