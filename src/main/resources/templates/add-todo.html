<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Todo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2>Add New Task</h2>

    <form th:action="@{/save-todo}" th:object="${todo}" method="post">
		
		<input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <input type="text" th:field="*{description}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Status</label>
			<select th:field="*{status}" class="form-control">
			    <option value="PENDING">PENDING</option>
			    <option value="COMPLETED">COMPLETED</option>
			</select>
        </div>
		
		<div class="mb-3">
		    <label>Expected Date & Time</label>
			<input type="datetime-local" th:field="*{dueDate}" class="form-control" id="dueDate">
		</div>

        <button class="btn btn-primary">
            Save Task
        </button>

    </form>

</div>
<script>
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());

    document.getElementById("dueDate").min = now.toISOString().slice(0,16);
</script>

</body>
</html>
